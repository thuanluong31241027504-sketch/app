<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0"></script>
    <style>
        body { font-family: monospace; text-align: center; background: white; }
        canvas { border: 1px solid black; background: white; cursor: crosshair; margin: 20px; }
        button { margin: 5px; padding: 8px 20px; cursor: pointer; }
        .result { margin-top: 20px; font-size: 20px; font-weight: bold; }
        .info { margin-top: 10px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <h3>Draw Emoji - AI Predict</h3>
    <canvas id="canvas" width="280" height="280"></canvas><br>
    <button onclick="clearCanvas()">clear</button>
    <button onclick="predict()">predict</button>
    <div class="result" id="result"></div>
    <div class="info" id="info">loading model...</div>

    <script>
        let model = null;
        const classes = ["cloud", "thumb", "heart", "smiling_horns", "grinning_face"];
        
        // LINK RAW GITHUB CỦA MÀY
        const MODEL_URL = 'https://raw.githubusercontent.com/thuanluong31241027504-sketch/app/main/model.json';
        
        async function loadModel() {
            try {
                document.getElementById('info').innerHTML = 'loading model...';
                model = await tf.loadLayersModel(MODEL_URL);
                document.getElementById('info').innerHTML = 'model ready!';
                document.getElementById('result').innerHTML = 'ready';
            } catch(e) {
                document.getElementById('info').innerHTML = 'error: ' + e.message;
                document.getElementById('result').innerHTML = 'model load failed';
                console.error(e);
            }
        }
        
        async function predict() {
            if (!model) {
                document.getElementById('result').innerHTML = 'wait for model...';
                return;
            }
            
            document.getElementById('info').innerHTML = 'predicting...';
            
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 28;
            tempCanvas.height = 28;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(canvas, 0, 0, 280, 280, 0, 0, 28, 28);
            
            const imgData = tempCtx.getImageData(0, 0, 28, 28);
            const data = imgData.data;
            let input = [];
            
            for (let i = 0; i < data.length; i += 4) {
                const gray = (data[i] + data[i+1] + data[i+2]) / 3;
                input.push(gray / 255.0);
            }
            
            input = input.map(v => 1 - v);
            
            const tensor = tf.tensor2d([input], [1, 784]);
            const prediction = await model.predict(tensor).data();
            const idx = prediction.indexOf(Math.max(...prediction));
            const confidence = (prediction[idx] * 100).toFixed(0);
            
            document.getElementById('result').innerHTML = `${classes[idx]} (${confidence}%)`;
            document.getElementById('info').innerHTML = 'done';
        }
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 15;
        ctx.lineCap = 'round';
        
        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('mouseleave', () => drawing = false);
        canvas.addEventListener('mousemove', (e) => {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        });
        
        function clearCanvas() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            document.getElementById('result').innerHTML = '';
            document.getElementById('info').innerHTML = 'cleared';
        }
        
        loadModel();
    </script>
</body>
</html>
